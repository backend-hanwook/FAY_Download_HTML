<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fine & You – 내부 QA 다운로드</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .app-icon {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #6B8F71, #4a6b52);
      border-radius: 22px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
    }

    .app-name {
      font-size: 28px;
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: -0.5px;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 12px;
      background: #f0f4f1;
      color: #4a6b52;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .qa-notice {
      margin-top: 8px;
      font-size: 12px;
      color: #8e8e93;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 28px 0;
    }

    /* 최신 버전 다운로드 버튼 */
    .download-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #6B8F71, #4a6b52);
      color: #ffffff;
      text-decoration: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
      transition: opacity 0.2s;
    }

    .download-btn:hover {
      opacity: 0.88;
    }

    .download-btn .sub {
      display: block;
      font-size: 12px;
      font-weight: 400;
      margin-top: 2px;
      opacity: 0.8;
    }

    /* 설치 가이드 */
    .guide {
      margin-top: 28px;
      text-align: left;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e93;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .guide-steps {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .guide-steps li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      color: #3d3d3d;
      line-height: 1.5;
    }

    .step-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      background: #f0f4f1;
      color: #4a6b52;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    /* 버전 히스토리 */
    .version-history {
      margin-top: 28px;
      text-align: left;
    }

    .version-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .version-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #f9f9f9;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.15s;
      gap: 12px;
    }

    .version-item:hover {
      background: #f0f4f1;
    }

    .version-item.latest {
      background: #f0f4f1;
      border: 1.5px solid #c2d5c5;
    }

    .version-item-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .version-tag {
      font-size: 14px;
      font-weight: 700;
      color: #1d1d1f;
    }

    .version-item.latest .version-tag {
      color: #4a6b52;
    }

    .version-note {
      font-size: 12px;
      color: #8e8e93;
    }

    .version-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .version-date {
      font-size: 12px;
      color: #c7c7cc;
    }

    .latest-pill {
      font-size: 10px;
      font-weight: 700;
      color: #4a6b52;
      background: #d6e8d9;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .download-icon {
      font-size: 16px;
      color: #4a6b52;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #c7c7cc;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-icon">🌿</div>

    <div class="app-name">Fine &amp; You</div>
    <span class="badge" id="latest-badge">v— · Android</span>
    <p class="qa-notice">내부 QA 전용 빌드입니다</p>

    <hr class="divider" />

    <a href="#" id="latest-btn" class="download-btn" target="_blank" rel="noopener noreferrer">
      APK 다운로드
      <span class="sub">Google Drive에서 받기</span>
    </a>

    <div class="guide">
      <p class="section-title">설치 방법</p>
      <ul class="guide-steps">
        <li><span class="step-num">1</span>위 버튼을 눌러 APK 파일을 다운로드하세요.</li>
        <li><span class="step-num">2</span>설정 → 보안 → <strong>알 수 없는 앱 설치</strong>를 허용해주세요.</li>
        <li><span class="step-num">3</span>다운로드된 APK 파일을 열어 설치를 완료하세요.</li>
        <li><span class="step-num">4</span>설치 후 앱을 실행하고 QA를 진행해주세요. 🙏</li>
      </ul>
    </div>

    <hr class="divider" />

    <div class="version-history">
      <p class="section-title">버전 히스토리</p>
      <div class="version-list" id="version-list">
        <!-- JS로 렌더링 -->
      </div>
    </div>

    <p class="footer">Fine &amp; You · Internal Build Only</p>
  </div>

  <script>
    fetch('./versions.json')
      .then(res => res.json())
      .then(versions => {
        // 최신 버전 = 배열 첫 번째
        const latest = versions[0];

        document.getElementById('latest-badge').textContent = `v${latest.version} · Android`;
        document.getElementById('latest-btn').href = latest.link;

        const list = document.getElementById('version-list');
        list.innerHTML = versions.map((v, i) => {
          const isLatest = i === 0;
          return `
            <a href="${v.link}" class="version-item ${isLatest ? 'latest' : ''}" target="_blank" rel="noopener noreferrer">
              <div class="version-item-left">
                <span class="version-tag">v${v.version}</span>
                <span class="version-note">${v.note}</span>
              </div>
              <div class="version-right">
                <span class="version-date">${v.date}</span>
                ${isLatest ? '<span class="latest-pill">최신</span>' : ''}
                <span class="download-icon">↓</span>
              </div>
            </a>
          `;
        }).join('');
      })
      .catch(() => {
        document.getElementById('version-list').innerHTML =
          '<p style="font-size:13px;color:#c7c7cc;">버전 정보를 불러올 수 없습니다.</p>';
      });
  </script>
</body>
</html>
